    <style>
        :root {
            --primary: #EC4899;
            --primary-light: #FBCFE8;
            --primary-dark: #BE185D;
            --secondary: #06B6D4;
            --secondary-light: #67E8F9;
            --background: linear-gradient(135deg, #FDF2F8 0%, #E0F2FE 100%);
            --surface: #FFFFFF;
            --text: #831843;
            --text-muted: #9F1239;
            --accent: #F59E0B;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #FDF2F8 0%, #E0F2FE 50%, #FDF2F8 100%);
            min-height: 100vh;
        }

        .font-serif {
            font-family: 'Noto Serif SC', serif;
        }

        .nav-active {
            background: linear-gradient(135deg, #EC4899 0%, #06B6D4 100%);
            color: white;
        }

        .memory-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .memory-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .upload-zone {
            border: 2px dashed #EC4899;
            transition: all 0.3s ease;
        }

        .upload-zone:hover {
            border-color: #06B6D4;
            background: #FDF2F8;
        }

        .btn-primary {
            background: linear-gradient(135deg, #EC4899 0%, #06B6D4 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(236, 72, 153, 0.4);
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .year-section {
            border-left: 4px solid #EC4899;
        }

        .memory-image {
            object-fit: cover;
            aspect-ratio: 16/9;
        }

        .coming-soon {
            animation: pulse 2s ease-in-out infinite;
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }
    </style>
</head>
